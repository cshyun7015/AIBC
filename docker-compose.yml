version: '3.8'

services:
  backend:
    build: ./backend
    container_name: aibc_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: aibc_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
